<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Header: VML Logo + App Name -->
  <div class="header">
    <img src="../assets/logo-vml.png" alt="VML" class="header-logo">
    <div class="header-info">
      <h1 class="header-title">VML AEM 360 Tool</h1>
      <p class="header-version" id="appVersion">v1.0 - Initializing</p>
    </div>
  </div>

  <div class="main-container" style="padding: 16px; min-height: auto;">
    

    <!-- Module: Asset Injector -->
    <div class="tool-section tab-content active" id="sectionAssetInjector">
      <div class="tool-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
        <div class="tool-header-left" style="display: flex; gap: 10px; align-items: center;">
          <div class="module-icon module-icon--injector" style="background: rgba(37, 99, 235, 0.1); color: #2563eb; padding: 8px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="module-header-info">
            <div class="module-title-row" style="display: flex; align-items: center; gap: 6px;">
              <h3 class="module-title" style="margin: 0; font-size: 14px; font-weight: 600; color: var(--text);">Asset Injector</h3>
              <button class="info-btn" data-module="assetInjector" type="button" aria-label="Show info" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 50%; color: var(--text-muted); cursor: pointer; font-size: 10px; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; padding: 0;">i</button>
            </div>
            <p class="module-desc" style="margin: 2px 0 0 0; font-size: 11px; color: var(--text-muted);">Inject files and folders directly into AEM.</p>
          </div>
        </div>
      </div>

      <div class="tool-body">
        <div class="field-group" style="margin-bottom: 10px;">
          <label class="field-label" style="font-size: 11px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; display: block; letter-spacing: 0.5px;">AEM BASE PATH:</label>
          <input type="text" id="aem-base-path" placeholder="/content/dam/my-project" style="width: 100%; border: 1px solid var(--border-accent); border-radius: var(--radius-sm); background: var(--bg-input); color: var(--text); padding: 8px; font-size: 11px; line-height: 1.4; outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease; margin-bottom: 12px;">
          
          <button id="btn-activate-dropzone" class="btn-search" style="width: 100%; background: linear-gradient(135deg, #1e3a8a, #2563eb); border-color: #3b82f6;">ACTIVATE DROPZONE IN AEM</button>
        </div>
        <p id="aem-status" class="autofill-status" style="margin-top: 10px; text-align: center; display: none; font-size: 11px;"></p>
      </div>
    </div>
  </div>

  <!-- Footer: VML Branding -->
  <div class="footer">
    <img src="../assets/logo-vml.png" alt="VML" class="footer-logo">
    <div class="footer-info">
      <span class="footer-label">DEVELOPED BY:</span>
      <strong class="footer-brand">VML ARGENTINA - AUTOMATION SQUAD</strong>
    </div>
  </div>

  <!-- Modular scripts -->
  <script src="modules-info.js"></script>
  <script src="popup-ui.js"></script>
  
  <!-- Custom Modal Overlay -->
  <div id="vmlModal" class="vml-modal-overlay" style="display: none;">
    <div class="vml-modal-content">
      <div class="vml-modal-header">
        <h3 id="vmlModalTitle" class="vml-modal-title">Review Required</h3>
        <button id="vmlModalClose" class="vml-modal-close">&times;</button>
      </div>
      <div class="vml-modal-body">
        <p id="vmlModalText"></p>
        <ul id="vmlModalList" class="vml-modal-list"></ul>
      </div>
      <div class="vml-modal-footer">
        <button id="vmlModalOkBtn" class="btn-search" style="width:100%;">OK</button>
      </div>
    </div>
  </div>

  <script src="../modules/asset-injector/popup-asset-injector.js"></script>
</body>

</html>
